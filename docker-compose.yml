version: '3.8'

services:

  # ── INFRASTRUCTURE ──────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - eventkl-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - eventkl-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
    networks:
      - eventkl-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - eventkl-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── SERVICE REGISTRY ────────────────────────────────────────

  service-registry:
    build: ./backend/service-registry
    container_name: service-registry
    ports:
      - "8761:8761"
    networks:
      - eventkl-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8761/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── MICROSERVICES ────────────────────────────────────────────

  user-service:
    build: ./backend/user-service
    container_name: user-service
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - eventkl-network
    restart: on-failure

  event-service:
    build: ./backend/event-service
    container_name: event-service
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    networks:
      - eventkl-network
    restart: on-failure

  booking-service:
    build: ./backend/booking-service
    container_name: booking-service
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - eventkl-network
    restart: on-failure

  waitlist-service:
    build: ./backend/waitlist-service
    container_name: waitlist-service
    ports:
      - "8087:8087"
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    networks:
      - eventkl-network
    restart: on-failure

  notification-service:
    build: ./backend/notification-service
    container_name: notification-service
    ports:
      - "8086:8086"
    depends_on:
      kafka:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    networks:
      - eventkl-network
    restart: on-failure

  api-gateway:
    build: ./backend/api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      service-registry:
        condition: service_healthy
    networks:
      - eventkl-network
    restart: on-failure

  # ── FRONTEND ─────────────────────────────────────────────────

  frontend:
    build: ./Frontend/eventkl
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - eventkl-network

# ── VOLUMES & NETWORKS ───────────────────────────────────────

volumes:
  postgres_data:

networks:
  eventkl-network:
    driver: bridge
